<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>명진구 웹툰</title>
    <style>
        :root {
            --naver-green: #00d564;
            --bg-gray: #f9f9f9;
            --text-main: #111;
            --text-sub: #888;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-gray);
            color: var(--text-main);
        }

        /* 상단 헤더 영역 */
        .header {
            position: sticky;
            top: 0;
            background: #fff;
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #eee;
            z-index: 100;
        }

        .back-btn { font-size: 20px; margin-right: 15px; cursor: pointer; }
        .title-top { font-weight: bold; flex-grow: 1; }

        /* 작품 썸네일 & 정보 영역 */
        .comic-info {
            background: #fff;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        .thumbnail {
            width: 120px;
            height: 150px;
            background: #e1e1e1; /* 실제 이미지가 없을 경우 대비 */
            border-radius: 4px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .details { display: flex; flex-direction: column; justify-content: center; }
        .comic-title { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
        .author { color: var(--naver-green); font-weight: 600; margin-bottom: 10px; }
        .meta { font-size: 13px; color: var(--text-sub); }

        /* 버튼 영역 */
        .action-buttons {
            display: flex;
            padding: 10px 20px;
            background: #fff;
            gap: 10px;
            border-bottom: 8px solid #eee;
        }

        .btn {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-first { background-color: #eee; color: #333; }
        .btn-interest { background-color: var(--naver-green); color: #fff; }

        /* 에피소드 리스트 */
        .episode-list { background: #fff; }
        .episode-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f2f2f2;
        }

        .ep-thumb {
            width: 80px;
            height: 45px;
            background: #ddd;
            margin-right: 15px;
            border-radius: 3px;
        }

        .ep-info { flex-grow: 1; }
        .ep-title { font-size: 15px; margin-bottom: 4px; }
        .ep-meta { font-size: 12px; color: var(--text-sub); }
        .rating { color: #f33; }

    </style>
</head>
<body>

    <div class="header">
        <span class="back-btn">〈</span>
        <span class="title-top">스트레이트 훅</span>
    </div>

    <div class="comic-info">
        <div class="thumbnail" style="background: url('https://via.placeholder.com/120x150/00d564/ffffff?text=LeeMalNyeon') center/cover;"><img src="whole.png" width="100%" style="width: 100%; height: 100%;object-fit: cover;"  alt=""></div>
        <div class="details">
            <div class="comic-title">스트레이트 훅</div>
            <div class="author">김명호</div>
            <div class="meta">목요웹툰 · 총 0화 · 미완결</div>
            <div class="meta" style="margin-top: 5px;">★ 9.88</div>
        </div>
    </div>

    <div class="action-buttons">
        <div class="btn btn-first" onclick="window.location.href = 'webtoon.html'">첫화보기</div>
        <div class="btn btn-interest">관심 99,999+</div>
    </div>

    <div class="episode-list" onclick="window.location.href = 'webtoon.html'">
        <div class="episode-item">
            <div class="ep-thumb"><img width="100%" style="width: 100%; height: 100%;object-fit: cover;" src="thumbnail.jpeg" alt=""></div>
            <div class="ep-info">
                <div class="ep-title">1화 - 내 이름은 전다윗</div>
                <div class="ep-meta">2026.05.12 · <span class="rating">★ 9.92</span></div>
            </div>
        </div>
    </div>

</body>
</html>
